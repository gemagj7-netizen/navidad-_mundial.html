<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Finlandia – Filtrando Ilusiones</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#020A18;touch-action:none;}

/* Imagen de fondo — ocupa TODA la pantalla, sin bordes */
#bg{
  position:fixed;inset:0;width:100%;height:100%;
  object-fit:cover;object-position:center bottom;
  z-index:0;
}

/* Canvas de animaciones encima — nieve + efectos táctiles */
#cv{
  position:fixed;inset:0;width:100%;height:100%;
  z-index:5;cursor:pointer;
}

/* ════════ AURORA BOREAL ════════
   La aurora se dibuja como SVG animado con opacidad alta
   directamente sobre la imagen, en la parte superior */
#aurora{
  position:fixed;
  top:0;left:0;right:0;
  height:52%;          /* ocupa mitad superior de pantalla */
  z-index:3;
  pointer-events:none;
  overflow:hidden;
}
/* Cada banda es un div con gradiente verde/azul, opacity alta */
.ab{
  position:absolute;
  left:-25%;right:-25%;
  border-radius:50%;
}
/* Verde brillante — banda principal */
.ab1{
  top:-10%;height:90%;
  background:radial-gradient(
    ellipse 120% 60% at 50% 40%,
    rgba(0,255,100,0.55) 0%,
    rgba(0,220,120,0.35) 35%,
    rgba(0,180,160,0.15) 60%,
    transparent 80%
  );
  animation:aur1 8s ease-in-out infinite;
}
/* Azul-cian — segunda banda */
.ab2{
  top:5%;height:80%;
  background:radial-gradient(
    ellipse 100% 50% at 50% 35%,
    rgba(40,200,255,0.40) 0%,
    rgba(20,160,220,0.20) 45%,
    transparent 75%
  );
  animation:aur2 11s ease-in-out infinite;
}
/* Violeta tenue — tercera banda */
.ab3{
  top:0;height:70%;
  background:radial-gradient(
    ellipse 80% 45% at 45% 30%,
    rgba(120,80,255,0.22) 0%,
    transparent 65%
  );
  animation:aur3 9s ease-in-out infinite;
}
/* Brillo central más intenso */
.ab4{
  top:2%;height:55%;
  background:radial-gradient(
    ellipse 60% 35% at 52% 25%,
    rgba(180,255,200,0.30) 0%,
    rgba(80,255,160,0.15) 40%,
    transparent 70%
  );
  animation:aur4 7s ease-in-out infinite;
}

@keyframes aur1{
  0%,100%{transform:translateX(-18%) scaleX(1.0) scaleY(1.0);}
  33%{transform:translateX(12%) scaleX(1.15) scaleY(1.20);}
  66%{transform:translateX(-5%) scaleX(0.92) scaleY(0.88);}
}
@keyframes aur2{
  0%,100%{transform:translateX(14%) scaleX(1.08);}
  50%{transform:translateX(-16%) scaleX(0.92);}
}
@keyframes aur3{
  0%,100%{transform:translateX(-10%) scaleY(1.0);}
  50%{transform:translateX(10%) scaleY(1.18);}
}
@keyframes aur4{
  0%,100%{transform:translateX(-6%) scaleX(1.0);opacity:0.8;}
  50%{transform:translateX(8%) scaleX(1.12);opacity:1.0;}
}

/* Estrellas en la parte superior */
#stars-top{
  position:fixed;top:0;left:0;right:0;height:45%;
  z-index:2;pointer-events:none;overflow:hidden;
}
.star{
  position:absolute;background:#fff;border-radius:50%;
  animation:twk ease-in-out infinite;
}
@keyframes twk{0%,100%{opacity:0.2;}50%{opacity:1;}}

/* Burbuja táctil */
.tbubble{
  position:fixed;pointer-events:none;z-index:20;
  border-radius:50%;
  background:rgba(255,255,255,0.15);
  border:2px solid rgba(255,255,255,0.55);
  animation:bpop 0.7s ease-out forwards;
}
@keyframes bpop{
  0%{transform:translate(-50%,-50%) scale(0);opacity:1;}
  100%{transform:translate(-50%,-50%) scale(4.5);opacity:0;}
}

/* Chat bubble */
.chat{
  position:fixed;pointer-events:none;z-index:21;
  background:rgba(255,255,255,0.97);
  border:1.5px solid rgba(100,200,130,0.7);
  border-radius:16px 16px 16px 4px;
  padding:9px 14px;font-family:Georgia,serif;
  font-size:13px;color:#1A3A10;
  white-space:nowrap;line-height:1.5;
  box-shadow:0 4px 18px rgba(0,0,0,0.35);
  animation:chatA 3.2s ease-out forwards;
  transform:translate(4px,-110%);
}
@keyframes chatA{
  0%{opacity:0;transform:translate(4px,-130%);}
  10%{opacity:1;transform:translate(4px,-110%);}
  78%{opacity:1;}
  100%{opacity:0;}
}

/* HUD */
#hud{
  position:fixed;top:0;left:0;right:0;z-index:10;
  padding:14px 60px 8px;
  background:linear-gradient(to bottom,rgba(0,5,18,0.82),transparent);
  pointer-events:none;text-align:center;
}
#hud h1{color:#E8F5E8;font-size:13.5px;font-style:italic;text-shadow:0 2px 8px #000;letter-spacing:0.3px;}
#hud p{color:rgba(80,240,160,0.95);font-size:10px;margin-top:3px;letter-spacing:1.2px;text-shadow:0 1px 4px #000;}

#back-link{
  position:fixed;top:14px;left:14px;z-index:15;
  background:rgba(0,10,30,0.75);border:1px solid rgba(100,220,150,0.45);
  color:#E8F5E8;font-size:11px;padding:6px 12px;border-radius:20px;
  text-decoration:none;font-family:Georgia,serif;
}

#hint{
  position:fixed;bottom:18px;left:0;right:0;
  text-align:center;z-index:10;
  color:rgba(180,255,210,0.90);font-size:11px;
  letter-spacing:0.8px;pointer-events:none;
  text-shadow:0 1px 6px #000;
  animation:hf 9s ease 1.5s forwards;
}
@keyframes hf{0%{opacity:1;}85%{opacity:1;}100%{opacity:0;}}
</style>
</head>
